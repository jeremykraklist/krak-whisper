<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 64px;
      height: 80px;
      overflow: visible;
      background: transparent;
      user-select: none;
    }

    /* Drag handle at top */
    .drag-handle {
      width: 64px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
      cursor: grab;
    }

    .drag-dots {
      width: 20px;
      height: 4px;
      display: flex;
      gap: 3px;
      justify-content: center;
      opacity: 0.3;
      transition: opacity 0.2s;
    }

    .drag-handle:hover .drag-dots {
      opacity: 0.7;
    }

    .drag-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: white;
    }

    .widget {
      width: 56px;
      height: 56px;
      margin: 0 auto;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-app-region: no-drag;
      position: relative;
    }

    .widget.idle {
      background: rgba(30, 30, 30, 0.9);
      border: 2px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    }

    .widget.idle:hover {
      background: rgba(50, 50, 50, 0.95);
      border-color: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }

    .widget.recording {
      background: rgba(220, 38, 38, 0.95);
      border: 2px solid rgba(255, 100, 100, 0.6);
      box-shadow: 0 0 20px rgba(220, 38, 38, 0.5);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .widget.transcribing {
      background: rgba(59, 130, 246, 0.95);
      border: 2px solid rgba(100, 160, 255, 0.6);
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
    }

    .widget.done {
      background: rgba(34, 197, 94, 0.95);
      border: 2px solid rgba(100, 220, 140, 0.6);
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 15px rgba(220, 38, 38, 0.4); }
      50% { box-shadow: 0 0 25px rgba(220, 38, 38, 0.7); }
    }

    .icon {
      width: 24px;
      height: 24px;
      fill: white;
      pointer-events: none;
    }

    .widget-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      cursor: pointer;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    /* Spinner for transcribing */
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Duration label */
    .duration {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 1px 6px;
      border-radius: 4px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <!-- Drag handle: grab here to move the widget -->
  <div class="drag-handle">
    <div class="drag-dots">
      <div class="drag-dot"></div>
      <div class="drag-dot"></div>
      <div class="drag-dot"></div>
    </div>
  </div>

  <div class="widget idle" id="widget">
    <button class="widget-btn" id="btn">
      <!-- Mic icon (idle) -->
      <svg class="icon" id="icon-mic" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
      <!-- Stop icon (recording) -->
      <svg class="icon" id="icon-stop" viewBox="0 0 24 24" style="display:none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="6" width="12" height="12" rx="2"/>
      </svg>
      <!-- Spinner (transcribing) -->
      <div class="spinner" id="icon-spinner" style="display:none"></div>
      <!-- Check icon (done) -->
      <svg class="icon" id="icon-check" viewBox="0 0 24 24" style="display:none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
      </svg>
    </button>
    <div class="duration" id="duration" style="display:none">0.0s</div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const widget = document.getElementById('widget');
    const btn = document.getElementById('btn');
    const duration = document.getElementById('duration');
    const iconMic = document.getElementById('icon-mic');
    const iconStop = document.getElementById('icon-stop');
    const iconSpinner = document.getElementById('icon-spinner');
    const iconCheck = document.getElementById('icon-check');

    let state = 'idle';
    let recordingStart = null;
    let durationInterval = null;

    function showIcon(name) {
      iconMic.style.display = name === 'mic' ? 'block' : 'none';
      iconStop.style.display = name === 'stop' ? 'block' : 'none';
      iconSpinner.style.display = name === 'spinner' ? 'block' : 'none';
      iconCheck.style.display = name === 'check' ? 'block' : 'none';
    }

    function setState(newState) {
      state = newState;
      widget.className = 'widget ' + newState;

      if (newState === 'idle') {
        showIcon('mic');
        duration.style.display = 'none';
        clearInterval(durationInterval);
      } else if (newState === 'recording') {
        showIcon('stop');
        duration.style.display = 'block';
        recordingStart = Date.now();
        durationInterval = setInterval(() => {
          const secs = ((Date.now() - recordingStart) / 1000).toFixed(1);
          duration.textContent = secs + 's';
        }, 100);
      } else if (newState === 'transcribing') {
        showIcon('spinner');
        duration.style.display = 'none';
        clearInterval(durationInterval);
      } else if (newState === 'done') {
        showIcon('check');
        duration.style.display = 'none';
        clearInterval(durationInterval);
        setTimeout(() => setState('idle'), 1500);
      }
    }

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      ipcRenderer.send('widget-toggle');
    });

    btn.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      ipcRenderer.send('widget-context-menu');
    });

    // Listen for state updates from main process
    ipcRenderer.on('widget-state', (_event, newState) => {
      setState(newState);
    });

    ipcRenderer.on('widget-status', (_event, text) => {
      if (text === 'Transcribing...') setState('transcribing');
    });

    ipcRenderer.on('widget-result', (_event, text) => {
      if (text && !text.startsWith('(')) {
        setState('done');
      } else {
        setState('idle');
      }
    });
  </script>
</body>
</html>
